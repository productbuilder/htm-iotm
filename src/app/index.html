<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>IOTM Participation Widget MVP</title>
		<link rel="stylesheet" href="./css/index.css" />
	</head>
	<body>
		<main class="page-shell">
			<h1>Timemap Uploader / IOTM Participation Widget</h1>
			<p>This page demonstrates locale-based widget text rendering.</p>

			<section>
				<h2>English widget (`locale="en-US"`)</h2>
				<iotm-participation-widget
					api-base-url="https://example.org/api"
					project-id="htm-iotm"
					locale="en-US"
					theme="light"
					allow-video="true"
					allow-audio="true"
					allow-image="true"
					max-file-size="10485760"
					organization-name="Hilversum Time Machine"
					header-title="Share Your Story"
				></iotm-participation-widget>
			</section>

			<section>
				<h2>Dutch widget (`locale="nl-NL"`)</h2>
				<iotm-participation-widget
					api-base-url="https://example.org/api"
					project-id="htm-iotm"
					locale="nl-NL"
					theme="light"
					allow-video="true"
					allow-audio="true"
					allow-image="true"
					max-file-size="10485760"
					organization-name="Hilversum Time Machine"
					header-title="Deel jouw verhaal"
				></iotm-participation-widget>
			</section>

			<section>
				<h2>Fallback widget (`locale="fr"` falls back to English)</h2>
				<iotm-participation-widget
					api-base-url="https://example.org/api"
					project-id="htm-iotm"
					locale="fr"
					theme="light"
					allow-video="true"
					allow-audio="true"
					allow-image="true"
					max-file-size="10485760"
					organization-name="Hilversum Time Machine"
					header-title="Share Your Story"
				></iotm-participation-widget>
			</section>
		</main>
		<script type="module" src="./index.js"></script>
	</body>
</html>
