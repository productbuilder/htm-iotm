<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>IOTM Widget Consumer Example</title>
		<link rel="stylesheet" href="./index.css" />
	</head>
	<body>
		<main>
			<h1>Consumer Integration Example</h1>
			<p id="consumer-helper-text"></p>

			<section>
				<h2 id="consumer-dialog-heading"></h2>
				<div class="consumer-toolbar">
					<label for="consumer-locale" id="consumer-locale-label"></label>
					<select id="consumer-locale">
						<option value="en">English</option>
						<option value="nl">Nederlands</option>
					</select>
					<button id="open-widget-dialog" type="button"></button>
				</div>
				<dialog id="consumer-widget-dialog" aria-labelledby="consumer-dialog-title">
					<div class="dialog-frame">
						<header class="dialog-header">
							<h3 id="consumer-dialog-title"></h3>
							<button id="close-widget-dialog" type="button"></button>
						</header>
						<p id="consumer-dialog-note"></p>
						<iotm-participation-widget
							id="dialog-widget"
							class="brand-theme-alt"
							locale="en-US"
							project-id="example-dialog"
							organization-name="City Heritage Lab"
							header-title="Community Memory Collection"
							about-title="About this community collection"
						></iotm-participation-widget>
					</div>
				</dialog>
			</section>

			<section>
				<h2>Inline embed remains available (`locale="en-US"`)</h2>
				<iotm-participation-widget
					id="default-widget"
					locale="en-US"
					project-id="example"
					organization-name="Example Museum"
					header-title="Share Your Story"
				></iotm-participation-widget>
			</section>
		</main>
		<script type="module" src="./index.js"></script>
	</body>
</html>
